# ───────────────────────────────────────────────────
# Rules — window rules, layer rules
# Port from niri: cfg/rules.kdl + mango extras
# ───────────────────────────────────────────────────

# ── Window: corner radius for all windows ──────────
# (niri: geometry-corner-radius 0, clip-to-geometry true)
# Mango handles this globally via border_radius; no per-window rule needed.

# ── Steam ──────────────────────────────────────────
windowrule=isfloating:1,appid:steam,title:^(?![Ss]team$)
windowrule=isopensilent:1,appid:steam,title:^notificationtoasts_\d+_desktop$
windowrule=isfloating:1,appid:steam,title:^notificationtoasts_\d+_desktop$

# ── Selection tools / screenshots ──────────────────
# (niri didn't have explicit rules, but good practice)
windowrule=isnoshadow:1,appid:slurp
windowrule=noblur:1,appid:slurp

# ── Layer rules ────────────────────────────────────
# Rofi — zoom animation
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# Noctalia wallpaper — no blur behind wallpaper layer
# (niri: place-within-backdrop true — not directly available in mango)
layerrule=noblur:1,layer_name:^noctalia-wallpaper

# Noctalia panels — disable blur and shadows for cleaner look
layerrule=noblur:1,layer_name:^noctalia
layerrule=noshadow:1,layer_name:^noctalia

# Selection layer — no animations or blur (avoids ghosting in screenshots)
layerrule=noanim:1,noblur:1,layer_name:selection