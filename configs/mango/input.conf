# ───────────────────────────────────────────────────
# Input — keyboard, mouse, trackpad
# ───────────────────────────────────────────────────

# ── Keyboard ───────────────────────────────────────
# (niri: xkb layout "us" + numlock)
repeat_rate=25
repeat_delay=600
numlockon=1                        # niri had numlock enabled
xkb_rules_layout=us

# ── Mouse ──────────────────────────────────────────
mouse_natural_scrolling=0
mouse_accel_profile=2              # adaptive
mouse_accel_speed=0.0

# ── Trackpad ───────────────────────────────────────
disable_trackpad=0
tap_to_click=1                     # niri: tap enabled
tap_and_drag=1
drag_lock=0
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
trackpad_accel_profile=2
trackpad_accel_speed=0.0
scroll_method=1                    # two-finger
click_method=1                     # button areas
send_events_mode=0

# ── Focus behavior ─────────────────────────────────
# (niri: focus-follows-mouse, workspace-auto-back-and-forth)
sloppyfocus=1                      # focus follows mouse
warpcursor=1                       # warp cursor on kb focus
focus_on_activate=1
focus_cross_monitor=0
focus_cross_tag=0
view_current_to_back=1             # niri: workspace-auto-back-and-forth