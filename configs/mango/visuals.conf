# ───────────────────────────────────────────────────
# Visuals — blur, shadows, animations, colors (Dracula)
# ───────────────────────────────────────────────────

# ── Blur ───────────────────────────────────────────
blur=1
blur_layer=0                       # keep panels/sharp overlays crisp
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.0

# ── Shadows ────────────────────────────────────────
shadows=1
layer_shadows=0                    # panels don't need shadows
shadow_only_floating=0
shadows_size=4
shadows_blur=12
shadows_position_x=2
shadows_position_y=2
shadowscolor=0x000000ff

# ── Border / radius ────────────────────────────────
border_radius=8                    # (niri had 0; mango default 6 — soften to 8)
no_radius_when_single=0
no_border_when_single=1
borderpx=2                         # thin border (niri focus-ring width 1)

# ── Opacity ────────────────────────────────────────
focused_opacity=1.0
unfocused_opacity=1.0

# ── Dracula color palette ──────────────────────────
# Background / surfaces
rootcolor=0x282a36ff
bordercolor=0x44475aff

# Accents
focuscolor=0xbd93f9ff
maximizescreencolor=0x50fa7bff
urgentcolor=0xff5555ff
scratchpadcolor=0x8be9fdff
globalcolor=0xff79c6ff
overlaycolor=0xf1fa8cff

# Drop / split indicators
dropcolor=0x8fba7c55
splitcolor=0xeb441eff

# ── Animations ─────────────────────────────────────
animations=1
layer_animations=0
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1          # horizontal tag switching
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8

# Durations (ms)
animation_duration_move=250        # (was 500 — slightly faster)
animation_duration_open=250        # (was 400)
animation_duration_tag=250         # (was 350)
animation_duration_close=250       # (was 800 — faster close)
animation_duration_focus=0
