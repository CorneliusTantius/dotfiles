# ───────────────────────────────────────────────────
# MangoWM + Noctalia v5 — main config entry point
# ───────────────────────────────────────────────────

source=./visuals.conf
source=./input.conf
source=./layouts.conf
source=./rules.conf
source=./bindings.conf

# ── Environment ────────────────────────────────────
# (port from niri: misc.kdl environment block)
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=QT_QPA_PLATFORM,wayland
env=QT_QPA_PLATFORMTHEME,gtk3
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland

# ── Cursor ─────────────────────────────────────────
# (niri: xcursor-theme "capitaine-cursors", xcursor-size 24)
# Mango only exposes cursor_size; xcursor theme set via env
cursor_size=24
env=XCURSOR_THEME,capitaine-cursors
env=XCURSOR_SIZE,24

# ── Autostart ──────────────────────────────────────
# (niri: spawn-sh-at-startup "qs -c noctalia-shell")
exec-once=noctalia

# ── Monitors ───────────────────────────────────────
# External monitor (top) + laptop (bottom)
# HDMI-A-1: 2560x1440@60, positioned at origin
# eDP-1:   1920x1200@60, below HDMI-A-1
monitorrule=name:^HDMI-A-1$,width:2560,height:1440,refresh:60,x:0,y:0
monitorrule=name:^eDP-1$,width:1920,height:1200,refresh:60,x:0,y:1440

# ── Misc system ────────────────────────────────────
syncobj_enable=1        # drm_syncobj for gaming (reduce stutter)
xwayland_persistence=0  # disabled — XWayland not installed
allow_shortcuts_inhibit=1