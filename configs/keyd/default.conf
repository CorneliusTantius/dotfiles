# keyd — system-level key remapping daemon
# Port from deprecated-2: etc/keyd/default.conf
# Maps Super key combos to Ctrl for convenient copy/paste/etc
# Usage: sudo systemctl enable --now keyd
#   keyd listens at /etc/keyd/default.conf (symlink this there or copy)

[ids]
*

# Super as Ctrl — ergonomic copy/paste without stretching for Ctrl
[meta]
c = C-c
v = C-v
x = C-x
a = C-a
f = C-f
z = C-z
y = C-y
t = C-t
w = C-w
n = C-n
p = C-p
d = C-d
r = C-r
s = C-s

# Super+Shift variants
[meta+shift]
n = C-S-n
p = C-S-p
